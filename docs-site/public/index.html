<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVLP Documentation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #333;
        }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .docs-list {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }
        .doc-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            transition: box-shadow 0.2s;
        }
        .doc-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .doc-card h3 {
            margin-top: 0;
            color: #007bff;
        }
        .doc-card a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }
        .doc-card a:hover {
            text-decoration: underline;
        }
        .description {
            color: #666;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>NVLP Documentation</h1>
    <p>Welcome to the NVLP (Virtual Envelope Budget App) documentation portal.</p>
    
    <div class="docs-list">
        <div class="doc-card">
            <h3><a href="/api-docs.html">API Documentation</a></h3>
            <p class="description">Complete API specification with endpoints, request/response schemas, and examples.</p>
        </div>
        
        <div class="doc-card">
            <h3><a href="/data-dictionary.html">Data Dictionary</a></h3>
            <p class="description">Comprehensive reference for all data structures, fields, and relationships.</p>
        </div>
    </div>
</body>
</html>
